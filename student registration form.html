<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#00c6ff,#0072ff);
    margin:0;
    padding:20px;
}

.container{
    width:400px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0px 0px 15px black;
}

h1{
    text-align:center;
    color:#0072ff;
}

label{
    font-weight:bold;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid gray;
}

.gender{
    width:auto;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#0072ff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>

</head>

<body>

<div class="container">

<h1>Student Registration Form</h1>

<form>

<label>Student Name</label>
<input type="text" placeholder="Enter your name">

<label>Father Name</label>
<input type="text" placeholder="Enter father name">

<label>Mother Name</label>
<input type="text" placeholder="Enter mother name">

<label>Age</label>
<input type="number" placeholder="Enter age">

<label>Date Of Birth</label>
<input type="date">

<label>Gender</label><br>

<input class="gender" type="radio" name="gender"> Male

<input class="gender" type="radio" name="gender"> Female

<input class="gender" type="radio" name="gender"> Other

<br><br>

<label>Class</label>
<select>
<option>Select Class</option>
<option>Class 8</option>
<option>Class 9</option>
<option>Class 10</option>
<option>Class 11</option>
<option>Class 12</option>
</select>

<label>Mobile Number</label>
<input type="tel" placeholder="Enter mobile number">

<label>Address</label>
<textarea placeholder="Enter address"></textarea>

<label>Hobbies</label><br>

<input class="gender" type="checkbox"> Gaming

<input class="gender" type="checkbox"> Reading

<input class="gender" type="checkbox"> Sports

<br><br>

<label>Upload Photo</label>
<input type="file">

<button type="submit">
Register
</button>

</form>

</div>

</body>
</html>
